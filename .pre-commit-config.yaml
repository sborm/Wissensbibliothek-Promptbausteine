repos:
  - repo: local
    hooks:
      - id: json-schema-validate
        name: JSON Schema Validate
        entry: ajv validate -s schema/library.schema.json -d data/library.json
        language: system
        pass_filenames: false
        files: ^(data/library\.json|schema/library\.schema\.json)$

      - id: validate-library-integrity
        name: Validate Library Integrity
        entry: python scripts/validate_integrity.py
        language: system
        pass_filenames: false
        files: ^(data/library\.json|schema/library\.schema\.json|scripts/validate_integrity\.py)$
