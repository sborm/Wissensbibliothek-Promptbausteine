repos:
  - repo: https://github.com/pre-commit/mirrors-prettier
    rev: v2.8.8
    hooks:
      - id: prettier

  - repo: local
    hooks:
      - id: json-schema-validate
        name: JSON Schema Validate
        entry: ajv validate -s schema/prompt-library.schema.json -d data/library.json
        language: system
        pass_filenames: false
        files: ^data/library\.json$

      - id: build-vscode-snippets
        name: Build VS Code Snippets
        entry: python scripts/build_vscode_snippets.py
        language: system
        pass_filenames: false
        files: ^data/library\.json$